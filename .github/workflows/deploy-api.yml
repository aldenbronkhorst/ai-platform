name: Build and Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/ai-core-api/**'
      - 'apps/odoo-connector-api/**'
      - 'apps/web-portal/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  API_PATH: apps/ai-core-api
  CONNECTOR_PATH: apps/odoo-connector-api

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ env.API_PATH }}
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd ${{ env.API_PATH }}
          pytest -v

  test-connector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ env.CONNECTOR_PATH }}
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd ${{ env.CONNECTOR_PATH }}
          PYTHONPATH=. pytest tests/ -v

  test-portal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install portal dependencies & build
        run: |
          cd apps/web-portal
          npm ci --workspaces=false
          npm run lint --workspaces=false
          npm run build --workspaces=false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd apps/ai-core-api
          pip install -r requirements.txt

      - name: Run build security tests
        run: |
          cd apps/ai-core-api
          pytest ../web-portal/tests/test_build_security.py ../web-portal/tests/test_v2_features.py -v

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test-core, test-connector, test-portal]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Environment Variables
        id: env
        run: |
          RESOURCE_GROUP="rg-ai-platform-prod-san-001"
          ACR_NAME="acraiplatformprodsan001"

          resolve_container_app() {
            local preferred_name="$1"
            local fallback_name="${2:-}"

            if az containerapp show --name "$preferred_name" --resource-group "$RESOURCE_GROUP" --query "name" -o tsv >/dev/null 2>&1; then
              echo "$preferred_name"
              return 0
            fi

            if [ -n "$fallback_name" ] && az containerapp show --name "$fallback_name" --resource-group "$RESOURCE_GROUP" --query "name" -o tsv >/dev/null 2>&1; then
              echo "$fallback_name"
              return 0
            fi

            echo "No deployed Container App found for $preferred_name${fallback_name:+ or $fallback_name}" >&2
            return 1
          }

          CONTAINER_APP=$(resolve_container_app "ca-ai-platform-api-prod-san-001")
          CONNECTOR_APP=$(resolve_container_app "ca-odoo-connector-prod-san-001" "ca-ai-platform-odoo-connector-prod-san-001")
          WORKER_APP=$(resolve_container_app "ca-ai-worker-prod" "ca-ai-platform-worker-prod-san-001")
          CONNECTOR_FQDN=$(az containerapp show --name "$CONNECTOR_APP" --resource-group "$RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "resource_group=${RESOURCE_GROUP}" >> $GITHUB_OUTPUT
          echo "acr_name=${ACR_NAME}" >> $GITHUB_OUTPUT
          echo "container_app=${CONTAINER_APP}" >> $GITHUB_OUTPUT
          echo "connector_app=${CONNECTOR_APP}" >> $GITHUB_OUTPUT
          echo "worker_app=${WORKER_APP}" >> $GITHUB_OUTPUT
          echo "connector_url=https://${CONNECTOR_FQDN}" >> $GITHUB_OUTPUT

      - name: ACR Login
        run: |
          az acr login --name ${{ steps.env.outputs.acr_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push AI Core API
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_PATH }}
          push: true
          tags: |
            ${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHEBUST=${{ github.sha }}

      - name: Build and Push Odoo Connector
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONNECTOR_PATH }}
          push: true
          tags: |
            ${{ steps.env.outputs.acr_name }}.azurecr.io/odoo-connector-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHEBUST=${{ github.sha }}

      - name: Deploy AI Core API
        run: |
          az containerapp update \
            --name ${{ steps.env.outputs.container_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --image "${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:${{ github.sha }}" \
            --set-env-vars ODOO_CONNECTOR_URL=${{ steps.env.outputs.connector_url }}
          az containerapp update \
            --name ${{ steps.env.outputs.worker_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --image "${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:${{ github.sha }}" \
            --set-env-vars ODOO_CONNECTOR_URL=${{ steps.env.outputs.connector_url }}

      - name: Deploy Odoo Connector
        run: |
          az containerapp update \
            --name ${{ steps.env.outputs.connector_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --image "${{ steps.env.outputs.acr_name }}.azurecr.io/odoo-connector-api:${{ github.sha }}"
          az containerapp ingress enable \
            --name ${{ steps.env.outputs.connector_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --type internal \
            --target-port 8000 \
            --transport auto \
            --allow-insecure false

      - name: Set up Node.js for Portal
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Web Portal
        run: |
          cd apps/web-portal
          npm ci --workspaces=false
          VITE_APP_COMMIT_SHA=${{ github.sha }} npm run build --workspaces=false

      - name: Deploy Web Portal to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web-portal/dist"
          skip_app_build: true
