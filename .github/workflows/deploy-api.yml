name: Build and Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/ai-core-api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BASE_NAME: aiplatform
  API_PATH: apps/ai-core-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ env.API_PATH }}
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd ${{ env.API_PATH }}
          pytest -v

  build:
    runs-on: ubuntu-latest
    needs: test
    environment: dev
    outputs:
      login_server: ${{ steps.acr.outputs.login_server }}
      acr_name: ${{ steps.acr.outputs.acr_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR Login Server
        id: acr
        run: |
          ACR_NAME=$(az acr list --resource-group "rg-${{ env.BASE_NAME }}-dev" --query "[0].name" -o tsv)
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query "loginServer" -o tsv)
          echo "login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT

      - name: ACR Login
        run: |
          az acr login --name ${{ steps.acr.outputs.acr_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_PATH }}
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/ai-core-api:latest
            ${{ steps.acr.outputs.login_server }}/ai-core-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name "ca-${{ env.BASE_NAME }}-api-dev" \
            --resource-group "rg-${{ env.BASE_NAME }}-dev" \
            --image "${{ needs.build.outputs.login_server }}/ai-core-api:${{ github.sha }}"
