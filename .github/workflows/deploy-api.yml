name: Build and Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/ai-core-api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  API_PATH: apps/ai-core-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ env.API_PATH }}
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd ${{ env.API_PATH }}
          pytest -v

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Environment Variables
        id: env
        run: |
          if [ "${{ github.event.inputs.environment || 'dev' }}" = "prod" ]; then
            echo "resource_group=rg-ai-platform-prod-san-001" >> $GITHUB_OUTPUT
            echo "acr_name=acraiplatformprodsan001" >> $GITHUB_OUTPUT
            echo "container_app=ca-ai-platform-api-prod-san-001" >> $GITHUB_OUTPUT
          else
            echo "resource_group=rg-aiplatform-dev" >> $GITHUB_OUTPUT
            echo "acr_name=acraiplatformdevex266st6" >> $GITHUB_OUTPUT
            echo "container_app=ca-aiplatform-api-dev" >> $GITHUB_OUTPUT
          fi

      - name: ACR Login
        run: |
          az acr login --name ${{ steps.env.outputs.acr_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_PATH }}
          push: true
          tags: |
            ${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:latest
            ${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name ${{ steps.env.outputs.container_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --image "${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:${{ github.sha }}"
