name: Build and Deploy API

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/ai-core-api/**'
      - 'apps/web-portal/**'
      - 'infra/bicep/**'
      # evals/** runs the tests so the required test-* checks report on evals-only
      # PRs (they're required by branch protection). Intentionally NOT in the push
      # paths below, so merging an evals-only change does not trigger a deploy.
      - 'evals/**'
      - '.github/workflows/deploy-api.yml'
  push:
    branches: [main]
    paths:
      - 'apps/ai-core-api/**'
      - 'apps/web-portal/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  API_PATH: apps/ai-core-api

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ env.API_PATH }}
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd ${{ env.API_PATH }}
          pytest -v

  test-portal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install portal dependencies & build
        run: |
          cd apps/web-portal
          npm ci --workspaces=false
          npm run test --workspaces=false
          npm run lint --workspaces=false
          npm run build --workspaces=false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd apps/ai-core-api
          pip install -r requirements-dev.txt

      - name: Run build security tests
        run: |
          cd apps/ai-core-api
          pytest ../web-portal/tests/test_build_security.py ../web-portal/tests/test_v2_features.py -v

  build-and-deploy-api:
    runs-on: ubuntu-latest
    needs: [test-core, test-portal]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Environment Variables
        id: env
        run: |
          RESOURCE_GROUP="rg-ai-platform-prod-san-001"
          ACR_NAME="acraiplatformprodsan001"

          resolve_container_app() {
            local preferred_name="$1"

            if az containerapp show --name "$preferred_name" --resource-group "$RESOURCE_GROUP" --query "name" -o tsv >/dev/null 2>&1; then
              echo "$preferred_name"
              return 0
            fi

            echo "No deployed Container App found for $preferred_name" >&2
            return 1
          }

          CONTAINER_APP=$(resolve_container_app "ca-ai-platform-api-prod-san-001")
          CONNECTOR_APP=$(resolve_container_app "ca-odoo-connector-prod-san-001")
          CONTAINER_FQDN=$(az containerapp show --name "$CONTAINER_APP" --resource-group "$RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv)
          CONNECTOR_FQDN=$(az containerapp show --name "$CONNECTOR_APP" --resource-group "$RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "resource_group=${RESOURCE_GROUP}" >> $GITHUB_OUTPUT
          echo "acr_name=${ACR_NAME}" >> $GITHUB_OUTPUT
          echo "container_app=${CONTAINER_APP}" >> $GITHUB_OUTPUT
          echo "connector_app=${CONNECTOR_APP}" >> $GITHUB_OUTPUT
          echo "api_url=https://${CONTAINER_FQDN}" >> $GITHUB_OUTPUT
          echo "connector_url=https://${CONNECTOR_FQDN}" >> $GITHUB_OUTPUT

      - name: ACR Login
        run: |
          az acr login --name ${{ steps.env.outputs.acr_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push AI Core API
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.API_PATH }}
          push: true
          tags: |
            ${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy AI Core API
        run: |
          CONNECTOR_ENDPOINTS_JSON=$(jq -cn \
            --arg url "${{ steps.env.outputs.connector_url }}" \
            '{odoo: {base_url: $url, api_key_env: "CONNECTOR_INTERNAL_API_KEY", broker_target: "odoo"}}')
          az containerapp update \
            --name ${{ steps.env.outputs.container_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --image "${{ steps.env.outputs.acr_name }}.azurecr.io/ai-core-api:${{ github.sha }}" \
            --set-env-vars \
              "CONNECTOR_ENDPOINTS_JSON=${CONNECTOR_ENDPOINTS_JSON}" \
              CONNECTOR_INTERNAL_API_KEY=secretref:odoo-connector-api-key \
            --remove-env-vars \
              ODOO_CONNECTOR_URL \
              ODOO_CONNECTOR_API_KEY
          az containerapp revision set-mode \
            --name ${{ steps.env.outputs.container_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --mode single

          EXPECTED_REVISION=$(az containerapp show \
            --name ${{ steps.env.outputs.container_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --query properties.latestRevisionName \
            -o tsv)
          for attempt in $(seq 1 36); do
            READY_REVISION=$(az containerapp show \
              --name ${{ steps.env.outputs.container_app }} \
              --resource-group ${{ steps.env.outputs.resource_group }} \
              --query properties.latestReadyRevisionName \
              -o tsv)
            if [ "$READY_REVISION" = "$EXPECTED_REVISION" ]; then
              echo "Azure revision $EXPECTED_REVISION is ready."
              exit 0
            fi
            echo "Waiting for Azure revision $EXPECTED_REVISION ($attempt/36)..."
            sleep 5
          done

          az containerapp revision show \
            --name ${{ steps.env.outputs.container_app }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --revision "$EXPECTED_REVISION" \
            --query '{name:name,health:properties.healthState,running:properties.runningState}' \
            -o json
          echo "Azure revision $EXPECTED_REVISION did not become ready." >&2
          exit 1

  deploy-portal:
    runs-on: ubuntu-latest
    needs: [test-portal, build-and-deploy-api]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Environment Variables
        id: env
        run: |
          RESOURCE_GROUP="rg-ai-platform-prod-san-001"
          CONTAINER_APP="ca-ai-platform-api-prod-san-001"
          CONTAINER_FQDN=$(az containerapp show --name "$CONTAINER_APP" --resource-group "$RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "api_url=https://${CONTAINER_FQDN}" >> $GITHUB_OUTPUT

      - name: Set up Node.js for Portal
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Build Web Portal
        run: |
          cd apps/web-portal
          npm ci --workspaces=false
          VITE_API_BASE_URL=${{ steps.env.outputs.api_url }} VITE_APP_COMMIT_SHA=${{ github.sha }} npm run build --workspaces=false

      - name: Deploy Web Portal to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web-portal/dist"
          skip_app_build: true
